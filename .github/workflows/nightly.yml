name: Nightly master tests

# Run the full QEMU test suite once a day (and on demand) against the latest
# truenas/zfs branch tip.  Scheduled workflows only fire from the default branch,
# so this inherently exercises master.  The pipeline itself is the reusable
# qemu-test.yml workflow, invoked via workflow_call.
on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/qemu-test.yml
