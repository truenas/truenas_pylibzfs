name: QEMU VM Tests

on:
  pull_request:
  workflow_call:
    inputs:
      zfs_sha:
        # Exact truenas/zfs commit to build against.  A caller that already
        # resolved the branch tip (zfs-watch) passes it here so the build, the
        # deb cache key and the caller's own bookkeeping all name the same
        # commit -- otherwise each would re-resolve the tip independently and a
        # push landing mid-run would leave them disagreeing.  Empty (the
        # default, and what nightly / PR runs use) means resolve the tip of
        # .github/zfs-branch at build time.
        description: 'truenas/zfs commit to pin the build to (default: branch tip)'
        type: string
        required: false
        default: ''
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# Bump IMAGE_VERSION to bust both the cloud-image cache and the
# OpenZFS deb cache together.  Use this when the cached cloud image
# has drifted (kernel update, broken DKMS rebuild, etc.) - the new
# image will come with a new kernel, and the ZFS debs need to
# rebuild against it.
env:
  IMAGE_VERSION: v1

jobs:
  qemu-test:
    name: Debian Trixie QEMU Test
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        # PR runs check out the PR head; schedule / workflow_dispatch /
        # workflow_call runs (nightly, zfs-watch) have no PR event, so fall back
        # to the triggering commit (master for scheduled runs).
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Setup QEMU
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-1-setup.sh

    - name: Get OpenZFS commit hash
      id: zfs-hash
      env:
        ZFS_SHA_IN: ${{ inputs.zfs_sha }}
      run: |
        ZFS_BRANCH=$(cat .github/zfs-branch)
        if [ -n "$ZFS_SHA_IN" ]; then
          ZFS_COMMIT="$ZFS_SHA_IN"
          echo "OpenZFS commit pinned by caller"
        else
          ZFS_COMMIT=$(git ls-remote https://github.com/truenas/zfs.git "refs/heads/$ZFS_BRANCH" | cut -f1)
        fi
        if [ -z "$ZFS_COMMIT" ]; then
          echo "::error::Could not resolve tip of $ZFS_BRANCH"
          exit 1
        fi
        echo "hash=$ZFS_COMMIT" >> $GITHUB_OUTPUT
        echo "OpenZFS branch: $ZFS_BRANCH"
        echo "OpenZFS commit: $ZFS_COMMIT"

    # Restore-only here; the matching save runs after "Build and install" (before
    # the tests) so freshly built ZFS debs are cached even if the tests later fail
    # -- a ZFS commit that breaks pylibzfs still warms the cache for the fix PR and
    # for nightly / other runs.  Because nightly and zfs-watch run on the default
    # branch, the caches they create are consumable by every PR and scheduled run.
    - name: Restore OpenZFS packages
      id: cache-zfs
      uses: actions/cache/restore@v4
      with:
        path: /tmp/zfs-debs
        key: zfs-debs-debian-trixie-${{ env.IMAGE_VERSION }}-${{ steps.zfs-hash.outputs.hash }}

    - name: Cache Debian Trixie cloud image
      id: cache-image
      uses: actions/cache@v4
      with:
        path: /tmp/qemu-work/debian-trixie.qcow2
        key: debian-trixie-cloudimage-${{ env.IMAGE_VERSION }}

    - name: Start Debian Trixie VM
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-2-start.sh

    - name: Build and install truenas_pylibzfs
      timeout-minutes: 30
      env:
        ZFS_CACHE_HIT: ${{ steps.cache-zfs.outputs.cache-hit }}
        # Always the commit resolved above, never a fresh branch lookup: the
        # from-source clone must build exactly the commit the deb cache key
        # names, or a push landing between the two would cache debs under the
        # wrong sha.
        ZFS_SHA: ${{ steps.zfs-hash.outputs.hash }}
      run: bash .github/workflows/scripts/qemu-3-build.sh

    # Persist the freshly built ZFS debs as soon as the build succeeds and before
    # the test step runs.  Reaching this step means the build passed (no always()
    # needed); the cache-miss guard avoids re-saving an existing immutable key.
    - name: Save OpenZFS packages
      if: steps.cache-zfs.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/zfs-debs
        key: zfs-debs-debian-trixie-${{ env.IMAGE_VERSION }}-${{ steps.zfs-hash.outputs.hash }}

    - name: Restart VM to load kernel modules
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-3.5-restart.sh

    - name: Run tests
      timeout-minutes: 20
      run: bash .github/workflows/scripts/qemu-4-test.sh

    - name: Collect logs
      if: always()
      timeout-minutes: 5
      run: bash .github/workflows/scripts/qemu-5-collect-logs.sh

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-logs-debian-trixie
        path: /tmp/qemu-logs.tar.gz
        if-no-files-found: ignore

    - name: Test Summary
      if: always()
      run: bash .github/workflows/scripts/qemu-6-summary.sh
