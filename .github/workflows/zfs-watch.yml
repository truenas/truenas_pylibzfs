name: ZFS release watch

# Poll the OpenZFS <train>-nightly release this repo tests against and rerun the
# full suite when the published debs advance to a commit we have not tested yet.
# This gives fast drift detection for ZFS-side breakage.  Because this runs on
# the default branch, a rerun exercises master.  The branch -> train mapping
# lives in .github/workflows/scripts/train-for-ref.sh.
on:
  schedule:
    - cron: '17 * * * *'  # hourly, offset off :00 to dodge scheduler backlog
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      commit: ${{ steps.state.outputs.commit }}
      train: ${{ steps.state.outputs.train }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve published OpenZFS release state
        id: state
        run: |
          TRAIN="$(.github/workflows/scripts/train-for-ref.sh "$GITHUB_REF_NAME")"
          URL="https://github.com/truenas/zfs/releases/download/${TRAIN}-nightly"
          # The rolling release replaces manifest.json on every publish; its
          # .commit identifies the exact OpenZFS source the current debs came
          # from (fall back to .date if commit is ever absent).
          if ! curl --fail -LSs -o manifest.json "$URL/manifest.json"; then
            echo "::error::No ${TRAIN}-nightly OpenZFS release published at $URL yet"
            exit 1
          fi
          COMMIT="$(jq -r '.commit // .date' manifest.json)"
          if [ -z "$COMMIT" ] || [ "$COMMIT" = "null" ]; then
            echo "::error::Could not read commit/date from the OpenZFS manifest"
            exit 1
          fi
          echo "train=$TRAIN" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "$TRAIN-nightly OpenZFS is at $COMMIT"

      # Full restore rather than lookup-only: the marker body carries the
      # pass/fail verdict that the "Decide" step below re-reports.
      - name: Look up test marker for this build
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .zfs-tested
          key: zfs-tested-${{ steps.state.outputs.commit }}

      - name: Decide whether to run
        id: decide
        run: |
          if [ "${{ steps.marker.outputs.cache-hit }}" != "true" ]; then
            echo "New OpenZFS build ${{ steps.state.outputs.commit }}; running tests."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=false" >> "$GITHUB_OUTPUT"
          # Markers predating the verdict field have a single column; treat
          # those as passing so pre-existing caches do not start failing runs.
          RESULT=$(awk '{print $2}' .zfs-tested 2>/dev/null || true)
          if [ "$RESULT" = "fail" ]; then
            echo "::error::OpenZFS ${{ steps.state.outputs.train }}-nightly build ${{ steps.state.outputs.commit }} failed the suite when it was tested.  Not re-testing it; this run stays red until the release advances or the marker cache is evicted."
            exit 1
          fi
          echo "Build ${{ steps.state.outputs.commit }} already tested and passing; skipping."

  test:
    needs: check
    if: needs.check.outputs.changed == 'true'
    uses: ./.github/workflows/qemu-test.yml
    # Pin the run to the train the check job resolved.
    with:
      train: ${{ needs.check.outputs.train }}

  mark:
    needs: [check, test]
    # Record the build as tested once the suite actually ran (pass OR fail), so we
    # exercise each OpenZFS build exactly once and do not re-run a broken build
    # every hour.  A failing verdict is not dropped on the floor: it is stored in
    # the marker, and the check job above re-reports it every hour, so the watcher
    # stays red for as long as the broken build is the published tip.
    if: always() && needs.test.result != 'skipped' && needs.test.result != 'cancelled'
    runs-on: ubuntu-24.04
    steps:
      - name: Write marker file
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            VERDICT=pass
          else
            VERDICT=fail
          fi
          echo "${{ needs.check.outputs.commit }} $VERDICT" > .zfs-tested
          echo "Marking ${{ needs.check.outputs.commit }} as $VERDICT"
      - name: Save marker
        uses: actions/cache/save@v4
        with:
          path: .zfs-tested
          key: zfs-tested-${{ needs.check.outputs.commit }}
